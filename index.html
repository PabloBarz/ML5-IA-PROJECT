<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ML5 Vision</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./assets/images/ui/favicon.png">

    <!-- ICONOS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        
    

</head>

<body>

    <!-- APP -->
    <main class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- LOGO -->
            <div class="logo">

                <div class="logo-icon">
                    <i class="fa-solid fa-brain"></i>
                </div>

                <div class="logo-info">
                    <h1>ML5 Vision</h1>
                    <p>Sistema de deteccion con IA</p>
                </div>

            </div>

            <!-- MENU -->
            <nav class="menu">

                <button class="menu-item active" data-route="image">
                    <i class="fa-solid fa-image"></i>
                    <span>Detector Imágenes</span>
                </button>

                <button class="menu-item" data-route="line">
                    <i class="fa-solid fa-hand"></i>
                    <span>Línea Manos</span>
                </button>

                <button class="menu-item" data-route="face">
                    <i class="fa-solid fa-face-smile"></i>
                    <span>FaceMesh</span>
                </button>

                <button class="menu-item" data-route="teachable">
                    <i class="fa-solid fa-microchip"></i>
                    <span>Teachable Machine</span>
                </button>

                <button class="menu-item" data-route="alert">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Alertas Persona</span>
                </button>

            </nav>

            <!-- FOOTER -->
            <footer class="sidebar-footer">

                <!-- STATUS -->
                <div class="status">

                    <div class="status-dot"></div>

                    <div>
                        <h3>Sistema Activo</h3>
                        <p>Todos los módulos operativos</p>
                    </div>

                </div>

                <!-- DEVELOPER -->
                <div class="developer">

                    <div class="developer-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <div>
                        <h3>Roberto Barzola</h3>
                        <p>AI Developer</p>
                    </div>

                </div>

            </footer>

        </aside>

        <!-- CONTENT -->
        <section id="app-content" class="content"></section>

    </main>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
