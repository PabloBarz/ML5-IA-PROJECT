<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ML5 Vision</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- APP -->
    <main class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- LOGO -->
            <div class="logo">

                <div class="logo-icon">
                    <i class="fa-solid fa-brain"></i>
                </div>

                <div class="logo-info">
                    <h1>ML5 Vision</h1>
                    <p>Sistema de deteccion con IA</p>
                </div>

            </div>

            <!-- MENU -->
            <nav class="menu">

                <button class="menu-item active">
                    <i class="fa-solid fa-image"></i>
                    <span>Detector Imágenes</span>
                </button>

                <button class="menu-item">
                    <i class="fa-solid fa-hand"></i>
                    <span>Línea Manos</span>
                </button>

                <button class="menu-item">
                    <i class="fa-solid fa-face-smile"></i>
                    <span>FaceMesh</span>
                </button>

                <button class="menu-item">
                    <i class="fa-solid fa-microchip"></i>
                    <span>Teachable Machine</span>
                </button>

                <button class="menu-item">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Alertas Persona</span>
                </button>

            </nav>

            <!-- FOOTER -->
            <footer class="sidebar-footer">

                <!-- STATUS -->
                <div class="status">

                    <div class="status-dot"></div>

                    <div>
                        <h3>Sistema Activo</h3>
                        <p>Todos los módulos operativos</p>
                    </div>

                </div>

                <!-- DEVELOPER -->
                <div class="developer">

                    <div class="developer-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <div>
                        <h3>Roberto Barzola</h3>
                        <p>AI Developer</p>
                    </div>

                </div>

            </footer>

        </aside>

        <!-- CONTENT -->
        <section class="content">

            <!-- HEADER -->
            <header class="content-header">

                <div>
                    <h2>Detector de Imágenes</h2>
                    <p>Reconocimiento de objetos con IA</p>
                </div>

                <div class="camera-status">
                    <div class="camera-dot"></div>
                    <span>Cámara Activa</span>
                </div>

            </header>

            <!-- VIEWER -->
            <div class="viewer">

                <div class="viewer-overlay">
                    <h3>VISUALIZACIÓN IA</h3>
                </div>

            </div>

            <!-- CARDS -->
            <div class="cards">

                <div class="card">
                    <h3>Modelo Activo</h3>
                    <p>MobileNet V2</p>
                </div>

                <div class="card">
                    <h3>Confianza</h3>
                    <p>97.4%</p>
                </div>

                <div class="card">
                    <h3>FPS</h3>
                    <p>28.7</p>
                </div>

                <div class="card">
                    <h3>Resolución</h3>
                    <p>640x480</p>
                </div>

            </div>

        </section>

    </main>

</body>

</html>
